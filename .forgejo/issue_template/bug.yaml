name: バグ報告
about: vnplayer の不具合報告
title: "[BUG] "
labels:
  - "status:new"
  - "by:human"
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きたか一言で
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する挙動
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の挙動
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 環境（ブラウザ/ビルド）
      placeholder: "Chrome 130 / build 2026-06-24"
  - type: textarea
    id: attachments
    attributes:
      label: スクショ・動画
      description: ここにドラッグ&ドロップで添付してください
